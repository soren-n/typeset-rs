name: Release

# Releases are cut by explicitly pushing a version tag, e.g.
#
#   ./scripts/update-version.sh 3.3.0
#   # update CHANGELOG.md, commit
#   git tag v3.3.0 && git push origin main --tags
#
# This workflow then verifies the tag matches the workspace version, builds,
# tests, publishes both crates to crates.io, and creates the GitHub Release.
on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  publish:
    name: Publish Crates
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Verify tag matches workspace version
      run: |
        TAG_VERSION="${GITHUB_REF_NAME#v}"
        CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
        echo "Tag version:       $TAG_VERSION"
        echo "Cargo.toml version: $CARGO_VERSION"
        if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
          echo "::error::Tag $GITHUB_REF_NAME does not match workspace version $CARGO_VERSION in Cargo.toml. Bump the version (scripts/update-version.sh) and retag."
          exit 1
        fi

    - name: Build release
      run: cargo build --release --all-features

    - name: Run tests
      run: cargo test --all --all-features

    - name: Prepare typeset-parser for publishing (remove dev-dependency)
      run: |
        # Temporarily remove the typeset dev-dependency to avoid circular dependency
        sed -i 's/^typeset\.workspace = true$/# typeset.workspace = true # removed for publishing/' typeset-parser/Cargo.toml

    - name: Publish typeset-parser to crates.io
      run: cargo publish --allow-dirty --token ${{ secrets.CRATES_API_TOKEN }} -p typeset-parser

    - name: Wait for typeset-parser to be available
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "Waiting for typeset-parser $VERSION to be available on crates.io..."
        sleep 30
        for i in {1..10}; do
          if cargo search typeset-parser --limit 1 | grep -q "typeset-parser.*$VERSION"; then
            echo "typeset-parser $VERSION is now available"
            break
          fi
          echo "Attempt $i: typeset-parser not yet available, waiting..."
          sleep 30
        done

    - name: Publish typeset to crates.io
      run: cargo publish --token ${{ secrets.CRATES_API_TOKEN }} -p typeset

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ github.ref_name }}
        name: ${{ github.ref_name }}
        body: |
          **Release ${{ github.ref_name }}**

          ### Published Crates
          - `typeset` ${{ github.ref_name }}
          - `typeset-parser` ${{ github.ref_name }}

          See [CHANGELOG.md](./CHANGELOG.md) for details.
        draft: false
        prerelease: false
