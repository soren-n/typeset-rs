name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Quality Gates (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rust: stable
            check_fmt: true
            check_clippy: true
          - rust: "1.89.0"
            check_fmt: false
            check_clippy: false
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: ${{ matrix.check_fmt && 'rustfmt, clippy' || '' }}

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.rust }}

    - name: Check formatting
      if: matrix.check_fmt
      run: cargo fmt --all --check

    - name: Run clippy
      if: matrix.check_clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Type checking
      run: cargo check --all-targets --all-features

    - name: Check doc links
      if: matrix.check_clippy
      run: cargo doc --no-deps --all-features

    - name: Run Rust tests
      run: cargo test --all --all-features

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - uses: EmbarkStudios/cargo-deny-action@v2

  differential:
    name: Differential (Rust vs OCaml oracle)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        key: differential

    - name: Setup OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: "5"

    - name: Install OCaml dependencies
      run: opam install --yes typeset qcheck dune

    # Builds the OCaml reference oracle/tester and the Rust `unit` binary the
    # differential checks compare. `opam exec` puts dune on PATH; cargo comes
    # from the Rust toolchain step.
    - name: Build differential harness
      run: cd tests && opam exec -- ./build.sh

    # The renderer is the part most prone to silent divergence, so the primary
    # correctness gate is the differential fuzzer, biased toward the grp/seq
    # nestings the uniform QCheck generator rarely produces.
    - name: Differential fuzzer (grp/seq-biased)
      run: |
        cd tests
        for seed in 1 2 3; do
          echo "--- seed $seed ---"
          python3 fuzz.py 3000 "$seed"
        done

    - name: QCheck oracle
      run: |
        cd tests
        for i in 1 2 3; do opam exec -- ./run.sh; done

  build:
    name: Build and Test
    needs: [check]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2

    - name: Build release
      run: cargo build --release --all-features

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: release-artifacts
        path: target/release/
        retention-days: 7
