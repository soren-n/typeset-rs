version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        patterns: ["*"]
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo-all:
        patterns: ["*"]
  - package-ecosystem: "cargo"
    directory: "/tests/unit/"
    schedule:
      interval: "weekly"
    groups:
      cargo-tests-all:
        patterns: ["*"]
