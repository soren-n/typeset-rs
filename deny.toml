# Configuration for cargo-deny
# See: https://embarkstudios.github.io/cargo-deny/
# Migrated to cargo-deny v2 schema (v1 lint-level fields removed upstream).

[graph]
# If true, metadata will be collected with `--all-features`
all-features = true

[output]
feature-depth = 1

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# Behaviour for yanked crate versions: "deny" | "warn" | "allow"
yanked = "warn"
# Scope of unmaintained-advisory checks: "all" | "workspace" | "transitive" | "none".
# v1 used `unmaintained = "warn"` (non-failing); "none" preserves that
# non-failing behaviour (vulnerabilities/unsound now always error in v2).
unmaintained = "none"
# A list of advisory IDs to ignore.
ignore = []

[licenses]
# v2 is allow-only: anything not listed here is denied (the old explicit
# `deny`/`unlicensed` keys were removed upstream; GPL/AGPL remain denied
# implicitly by not being in `allow`).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8
# Per-crate license exceptions, e.g. { allow = ["Zlib"], name = "adler32" }
exceptions = []

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is wildcarded
wildcards = "allow"
# Crates to ban entirely
deny = []
# Crates skipped during duplicate detection
skip = []
# Crate trees skipped during duplicate detection
skip-tree = []

[sources]
# Lint level for an unknown crate registry
unknown-registry = "warn"
# Lint level for an unknown git source
unknown-git = "warn"
# Allowed crate registries (crates.io only by default)
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Allowed git repositories
allow-git = []
